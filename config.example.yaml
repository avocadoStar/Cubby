# Cubby 配置文件
# 复制为 config.yaml 并修改后使用：cp config.example.yaml config.yaml

# HTTP 监听端口
port: "8080"

# SQLite 数据库文件路径
db_path: "cubby.db"

# JWT 签名密钥（生产环境务必修改为随机字符串）
# - 最少 32 个字符
# - 生成方法：openssl rand -hex 32
# - 不能使用常见占位符如 "change-me"、"secret" 等
jwt_secret: "change-me-in-production"

# 登录密码（明文，启动时自动加密存储）
# - 最少 8 个字符
password: "your-password"
