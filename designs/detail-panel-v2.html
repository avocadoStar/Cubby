<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cubby Detail Panel — Fluent Design</title>
<style>
:root {
  --bg: #FAFAFA; --card: #fff; --border: #E0E0E0;
  --hover: #F5F5F5; --accent: #0078D4; --accent-light: #E5F0FF;
  --text: #1a1a1a; --t2: #666; --t3: #999;
  --radius: 8px; --gap: 3px;
  --danger: #C63737;
  font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 13px;
}

*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}

/* === Sidebar === */
.sidebar{width:230px;flex-shrink:0;background:var(--card);border-right:1px solid var(--border);padding:16px 12px;overflow-y:auto}
.sidebar-title{font-size:15px;font-weight:600;margin-bottom:10px}
.tree-item{padding:5px 8px;border-radius:6px;cursor:default;display:flex;align-items:center;gap:6px;font-size:13px;margin-bottom:1px}
.tree-item:hover{background:var(--hover)}
.tree-item.active{color:var(--accent);font-weight:500}

/* === Main Area === */
.main{flex:1;display:flex;overflow:hidden}
.bookmark-list{flex:1;min-width:0;padding:12px;overflow-y:auto}

/* === Card Rows === */
.card-row{display:flex;align-items:center;height:38px;padding:0 12px;border-radius:var(--radius);cursor:default;margin-bottom:var(--gap);
  border:1px solid var(--border);background:var(--card);transition:all .15s}
.card-row:hover{border-color:#CCC;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.card-row.active{border-color:var(--accent);background:var(--accent-light);border-radius:8px 8px 0 0;margin-bottom:0}
.r-c{width:18px;height:18px;border-radius:50%;border:2px solid var(--t3);flex-shrink:0;margin-right:10px}
.r-i{width:18px;height:18px;border-radius:4px;background:var(--hover);flex-shrink:0;margin-right:8px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--t2)}
.r-t{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-u{width:200px;flex-shrink:0;font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-right:8px}
.r-d{width:65px;flex-shrink:0;font-size:12px;color:var(--t2)}
.r-n{width:26px;height:26px;flex-shrink:0;border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;margin:0 4px;border:none;background:transparent;color:var(--t3);transition:all .15s;font-weight:600}
.r-n:hover{background:var(--hover)}
.r-n.has-note{color:var(--accent)}

/* === Right Detail Panel === */
.detail-panel{width:0;overflow:hidden;flex-shrink:0;background:var(--card);border-left:1px solid transparent;transition:width .25s ease-out,border-color .25s}
.detail-panel.open{width:300px;border-left-color:var(--border)}
.detail-inner{width:300px;padding:20px;opacity:0;transform:translateX(8px);transition:opacity .2s ease-out .05s,transform .2s ease-out .05s}
.detail-panel.open .detail-inner{opacity:1;transform:translateX(0)}

/* Panel Header */
.detail-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.detail-title{font-size:16px;font-weight:600;line-height:1.35;word-break:break-word;padding-right:8px}
.detail-close{width:28px;height:28px;flex-shrink:0;border-radius:6px;border:none;background:transparent;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s}
.detail-close:hover{background:var(--hover);color:var(--text)}

/* URL */
.detail-url{font-size:12px;color:var(--t2);margin-bottom:16px;word-break:break-all;line-height:1.4;cursor:pointer}
.detail-url:hover{color:var(--accent);text-decoration:underline}

/* Metadata row (folder + date) */
.detail-meta{display:flex;gap:16px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.meta-item{display:flex;flex-direction:column;gap:3px}
.meta-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);font-weight:500}
.meta-value{font-size:13px;color:var(--text);display:flex;align-items:center;gap:4px}
.meta-value svg{width:14px;height:14px;color:var(--t2)}

/* Tags */
.detail-tags{margin-bottom:20px}
.tags-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);font-weight:500;margin-bottom:6px}
.tags-input{width:100%;height:32px;padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;color:var(--text);background:var(--bg);outline:none;transition:border-color .15s}
.tags-input:focus{border-color:var(--accent)}
.tags-input::placeholder{color:var(--t3)}

/* === Notes Section (main focus) === */
.notes-section{flex:1;display:flex;flex-direction:column}
.notes-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.notes-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--t2)}
.notes-count{font-size:10px;color:var(--t3);font-variant-numeric:tabular-nums;transition:color .15s}
.notes-count.warn{color:#E4A000}

.notes-textarea{width:100%;flex:1;min-height:180px;max-height:320px;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:13px;line-height:1.6;font-family:inherit;color:var(--text);background:var(--bg);resize:none;outline:none;transition:border-color .15s,box-shadow .15s}
.notes-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,120,212,.1)}
.notes-textarea::placeholder{color:var(--t3)}

.notes-actions{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.notes-saved{font-size:11px;color:var(--t3);opacity:0;transition:opacity .3s}
.notes-saved.show{opacity:1}
.notes-delete{font-size:11px;color:var(--t3);border:none;background:transparent;cursor:pointer;padding:4px 8px;border-radius:4px;transition:all .15s}
.notes-delete:hover{color:var(--danger);background:rgba(198,55,55,.06)}

/* Placeholder when nothing selected */
.detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--t3);gap:8px}
.detail-empty svg{width:40px;height:40px;opacity:.3}
.detail-empty p{font-size:12px}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-title">收藏夹</div>
  <div class="tree-item">⭐ 所有书签</div>
  <div class="tree-item" style="padding-left:16px">📁 收藏夹</div>
  <div class="tree-item active" style="padding-left:32px">📁 电影资源</div>
  <div class="tree-item" style="padding-left:32px">📁 工具网站</div>
</div>

<!-- Main Area -->
<div class="main">
  <div class="bookmark-list" id="list">

    <div class="card-row active" id="row1" onclick="selectRow(this,'4K影视','https://www.4ksj.com/forum-4kdianying-1.html','电影资源','04-20',true,true)">
      <div class="r-c"></div><div class="r-i">4</div>
      <div class="r-t">4K影视</div><div class="r-u">https://www.4ksj.com/forum</div><div class="r-d">04-20</div>
      <button class="r-n has-note" onclick="event.stopPropagation();selectRow(this.parentElement,'4K影视','https://www.4ksj.com/forum-4kdianying-1.html','电影资源','04-20',true,true)">N</button>
    </div>

    <div class="card-row" id="row2" onclick="selectRow(this,'百度百科-验证','https://baike.baidu.com/item/1/31661','工具网站','05-03',false,false)">
      <div class="r-c"></div><div class="r-i">百</div>
      <div class="r-t">百度百科-验证</div><div class="r-u">https://baike.baidu.com</div><div class="r-d">05-03</div>
      <button class="r-n" onclick="event.stopPropagation();selectRow(this.parentElement,'百度百科-验证','https://baike.baidu.com/item/1/31661','工具网站','05-03',false,false)">N</button>
    </div>

    <div class="card-row" id="row3" onclick="selectRow(this,'GitHub','https://github.com','工具网站','03-15',true,true)">
      <div class="r-c"></div><div class="r-i">G</div>
      <div class="r-t">GitHub</div><div class="r-u">https://github.com</div><div class="r-d">03-15</div>
      <button class="r-n has-note" onclick="event.stopPropagation();selectRow(this.parentElement,'GitHub','https://github.com','工具网站','03-15',true,true)">N</button>
    </div>

    <div class="card-row" id="row4" onclick="selectRow(this,'布谷TV | 4K电影下载-免费下载4K电影','https://www.bugutv.org','电影资源','02-10',false,false)">
      <div class="r-c"></div><div class="r-i">布</div>
      <div class="r-t">布谷TV | 4K电影下载</div><div class="r-u">https://www.bugutv.org</div><div class="r-d">02-10</div>
      <button class="r-n" onclick="event.stopPropagation();selectRow(this.parentElement,'布谷TV | 4K电影下载-免费下载4K电影','https://www.bugutv.org','电影资源','02-10',false,false)">N</button>
    </div>

  </div>

  <!-- Detail Panel -->
  <div class="detail-panel open" id="panel">
    <div class="detail-inner">
      <!-- Header: title + close -->
      <div class="detail-header">
        <div class="detail-title" id="pTitle">4K影视</div>
        <button class="detail-close" onclick="document.getElementById('panel').classList.remove('open')">✕</button>
      </div>

      <!-- URL -->
      <div class="detail-url" id="pUrl" onclick="window.open(this.textContent,'_blank')">https://www.4ksj.com/forum-4kdianying-1.html</div>

      <!-- Metadata: folder + created date -->
      <div class="detail-meta">
        <div class="meta-item">
          <div class="meta-label">所在文件夹</div>
          <div class="meta-value" id="pFolder">
            <svg viewBox="0 0 24 24" fill="#F0C54F" stroke="#D4A830" stroke-width="0.6"><path d="M2 6a2 2 0 012-2h5l2 2h9a2 2 0 012 2v10a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/></svg>
            电影资源
          </div>
        </div>
        <div class="meta-item">
          <div class="meta-label">创建时间</div>
          <div class="meta-value" id="pDate" style="color:var(--t2)">2026-04-20</div>
        </div>
      </div>

      <!-- Tags -->
      <div class="detail-tags">
        <div class="tags-label">标签</div>
        <input class="tags-input" placeholder="添加标签，用逗号分隔..." value="电影, 4K, 免费" />
      </div>

      <!-- Notes -->
      <div class="notes-section">
        <div class="notes-header">
          <div class="notes-label">⭐ 备注 Notes</div>
          <div class="notes-count" id="pCount">38 / 1000</div>
        </div>
        <textarea class="notes-textarea" id="pNotes" placeholder="输入备注..."
          oninput="updateCount();autoResize(this)"
        >4K电影资源站，更新频率高，免费下载高清资源。已收藏多个分类页面方便查找。</textarea>
        <div class="notes-actions">
          <span class="notes-saved" id="pSaved">已自动保存</span>
          <button class="notes-delete" onclick="document.getElementById('pNotes').value='';updateCount();autoResize(document.getElementById('pNotes'))">清空备注</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// Row selection
function selectRow(row, title, url, folder, date, hasNote, openPanel){
  // Highlight
  document.querySelectorAll('.card-row').forEach(r=>r.classList.remove('active'));
  row.classList.add('active');

  // Update panel
  document.getElementById('pTitle').textContent = title;
  document.getElementById('pUrl').textContent = url;
  document.getElementById('pFolder').innerHTML = '<svg viewBox="0 0 24 24" fill="#F0C54F" stroke="#D4A830" stroke-width="0.6"><path d="M2 6a2 2 0 012-2h5l2 2h9a2 2 0 012 2v10a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/></svg> ' + folder;
  document.getElementById('pDate').textContent = '2026-'+date;

  // Open panel
  if(openPanel) document.getElementById('panel').classList.add('open');
}

// Character count
function updateCount(){
  const ta = document.getElementById('pNotes');
  const count = document.getElementById('pCount');
  const len = ta.value.length;
  count.textContent = len + ' / 1000';
  count.classList.toggle('warn', len > 900);

  // Show saved indicator
  const saved = document.getElementById('pSaved');
  saved.classList.add('show');
  clearTimeout(saved._t);
  saved._t = setTimeout(()=>saved.classList.remove('show'), 1500);
}

// Auto resize textarea
function autoResize(el){
  el.style.height = 'auto';
  el.style.height = Math.min(Math.max(el.scrollHeight, 180), 320) + 'px';
}

// Init
autoResize(document.getElementById('pNotes'));
updateCount();
</script>
</body>
</html>
